# 绿联 NAS / 离线镜像部署用 Compose 文件
#
# 部署目录：/volume1/docker/trading-agents
#
# 前置：创建共享网络（若尚未存在）
#   docker network create ai-stack
#
# 首次部署：
#   cd /volume1/docker/trading-agents
#   cp .env.example .env
#   mkdir -p data
#   docker load -i tradingagents-0.3.2-linux-arm64.tar
#   docker compose -f docker-compose.nas.yml up -d
#
# OpenClaw 等同网容器访问：http://tradingagents-mcp:8080/mcp

name: trading-agents

services:
  tradingagents-mcp:
    image: tradingagents:0.3.2
    container_name: tradingagents-mcp
    entrypoint: ["docker-entrypoint.sh"]
    command: ["tradingagents-mcp"]
    env_file:
      - .env
    environment:
      PUID: "1000"
      PGID: "10"
      TZ: Asia/Shanghai
      TRADINGAGENTS_MCP_HOST: "0.0.0.0"
      TRADINGAGENTS_MCP_PORT: "8080"
      TRADINGAGENTS_CACHE_DIR: /home/appuser/.tradingagents/cache
      TRADINGAGENTS_RESULTS_DIR: /home/appuser/.tradingagents/logs
      TRADINGAGENTS_MEMORY_LOG_PATH: /home/appuser/.tradingagents/memory/trading_memory.md
    volumes:
      - /volume1/docker/trading-agents/data:/home/appuser/.tradingagents
    working_dir: /home/appuser/app
    ports:
      - "8080:8080"
    networks:
      - ai-stack
    restart: unless-stopped
    init: true

networks:
  ai-stack:
    external: true
